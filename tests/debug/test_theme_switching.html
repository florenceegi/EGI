<!DOCTYPE html>
<html lang="it" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Theme Switching - FlorenceEGI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        /* Test degli stili che abbiamo aggiornato */
        .nav-test {
            @apply text-gray-700 dark:text-gray-300;
        }

        .bg-test {
            @apply bg-white dark:bg-gray-900;
        }
    </style>
</head>

<body class="h-full bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300">

    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-8 text-center">Test Compatibilità Tema FlorenceEGI</h1>

        <!-- Test Switch Theme -->
        <div class="text-center mb-8">
            <button id="themeToggle"
                class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                🌓 Cambia Tema
            </button>
            <span id="currentTheme" class="ml-4 text-sm text-gray-600 dark:text-gray-400"></span>
        </div>

        <!-- Test Componenti Header -->
        <div class="mb-8 p-6 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-semibold mb-4">Test Header Navigation</h2>
            <nav class="flex space-x-4">
                <a href="#"
                    class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Home</a>
                <a href="#"
                    class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Creator</a>
                <a href="#"
                    class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Collections</a>
            </nav>
        </div>

        <!-- Test Mobile Menu Container -->
        <div
            class="mb-8 p-6 bg-white/95 dark:bg-gray-900/90 rounded-lg border border-gray-300/50 dark:border-gray-700/50 shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Test Mobile Menu Container</h2>
            <div class="space-y-2">
                <div
                    class="flex items-center space-x-3 px-4 py-3 text-gray-700 dark:text-gray-200 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-xl transition-colors">
                    <span>🏠</span>
                    <span>Home</span>
                </div>
                <div
                    class="flex items-center space-x-3 px-4 py-3 text-gray-700 dark:text-gray-200 hover:bg-purple-50 dark:hover:bg-purple-900/20 rounded-xl transition-colors">
                    <span>🎨</span>
                    <span>Creator</span>
                </div>
            </div>
        </div>

        <!-- Test Sub-menu Links -->
        <div class="mb-8 p-6 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-semibold mb-4">Test Sub-menu Links</h2>
            <div class="space-y-1">
                <a href="#"
                    class="block px-2 py-1 text-sm text-gray-600 dark:text-gray-300 hover:text-emerald-600 dark:hover:text-emerald-400 hover:bg-white/50 dark:hover:bg-black/20 rounded-lg transition-colors">
                    📊 Statistiche
                </a>
                <a href="#"
                    class="block px-2 py-1 text-sm text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-white/50 dark:hover:bg-black/20 rounded-lg transition-colors">
                    🔒 Privacy
                </a>
                <a href="#"
                    class="block px-2 py-1 text-sm text-gray-600 dark:text-gray-300 hover:text-orange-600 dark:hover:text-orange-400 hover:bg-white/50 dark:hover:bg-black/20 rounded-lg transition-colors">
                    📋 Log Attività
                </a>
            </div>
        </div>

        <!-- Test Status -->
        <div class="text-center">
            <div
                class="inline-flex items-center px-4 py-2 bg-green-100 dark:bg-green-900/20 text-green-800 dark:text-green-400 rounded-lg">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                        clip-rule="evenodd"></path>
                </svg>
                Sistema di tema implementato correttamente!
            </div>
        </div>
    </div>

    <script>
        // Sistema di gestione tema
        const themeToggle = document.getElementById('themeToggle');
        const currentThemeSpan = document.getElementById('currentTheme');
        const html = document.documentElement;

        // Funzione per aggiornare il display del tema corrente
        function updateThemeDisplay() {
            const isDark = html.classList.contains('dark');
            currentThemeSpan.textContent = isDark ? 'Tema Scuro Attivo' : 'Tema Chiaro Attivo';
            themeToggle.textContent = isDark ? '☀️ Tema Chiaro' : '🌙 Tema Scuro';
        }

        // Inizializza basandosi sulla preferenza del sistema
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.classList.add('dark');
        }

        updateThemeDisplay();

        // Toggle tema
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            updateThemeDisplay();

            // Salva la preferenza in localStorage
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // Carica la preferenza salvata
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            if (savedTheme === 'dark') {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
            updateThemeDisplay();
        }

        // Ascolta i cambiamenti della preferenza del sistema
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                if (e.matches) {
                    html.classList.add('dark');
                } else {
                    html.classList.remove('dark');
                }
                updateThemeDisplay();
            }
        });
    </script>
</body>

</html>
