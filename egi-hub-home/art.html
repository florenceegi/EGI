<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLORENCE ART | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a0024 0%, #000 100%);
            text-align: center;
        }

        .container {
            border: 1px solid var(--border-light);
            background: var(--glass-dark);
            padding: 60px;
            backdrop-filter: blur(20px);
            border-left: 5px solid var(--purple);
            max-width: 600px;
        }

        h1 {
            font-family: 'Share Tech Mono';
            font-size: 48px;
            color: white;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        h1 span {
            color: var(--purple);
        }

        .status {
            font-family: 'Share Tech Mono';
            color: var(--text-muted);
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: block;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-back {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            font-family: 'Share Tech Mono';
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 30px var(--primary);
        }
    </style>
</head>

<body>

    <div class="container">
        <span class="status">// SYSTEM STATUS: DEPLOYING</span>
        <h1>FLORENCE <span>ART</span></h1>
        <p>Il modulo Art & Collectibles è attualmente in fase di costruzione e calibrazione. Torna presto per scoprire
            il marketplace phygital.</p>

        <a href="index.html" class="btn-back">TORNA ALL'HUB</a>
    </div>

</body>

</html>
